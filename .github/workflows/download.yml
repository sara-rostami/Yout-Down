# .github/workflows/download.yml
name: YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install gallery-dl
        run: pip install gallery-dl
      
      - name: Download video/audio
        env:
          VIDEO_URL: ${{ github.event.inputs.url }}
        run: |
          # استفاده از Invidious instance
          gallery-dl \
            --no-check-certificate \
            --extractor-retries 3 \
            --extractor-timeout 30 \
            --write-info-json \
            --write-description \
            --write-thumbnail \
            --write-annotations \
            --write-subtitles \
            --subtitles-format srt \
            --subtitles-lang en,fa \
            -o "directory=downloads" \
            -o "filename={title}.{extension}" \
            --download-threads 1 \
            "https://yewtu.be/watch?v=$(echo '$VIDEO_URL' | grep -o 'v=[^&]*' | cut -d'=' -f2)"
      
      - name: List files
        run: |
          echo "=== Downloaded files ==="
          find downloads -type f -name "*.mp3" -o -name "*.mp4" -o -name "*.webm" -o -name "*.mkv" 2>/dev/null | head -20
          echo "=== File sizes ==="
          du -sh downloads/ 2>/dev/null || echo "Empty"
      
      - name: Commit and push
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          
          cd downloads
          ls -t | tail -n +11 | xargs rm -f 2>/dev/null || true
          cd ..
          
          git add downloads/
          if ! git diff --staged --quiet; then
            git commit -m "📥 Download $(date +'%Y-%m-%d %H:%M')"
            git push
            echo "✅ Success!"
          fi
