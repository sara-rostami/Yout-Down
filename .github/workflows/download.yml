# .github/workflows/download.yml
name: YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install pytubefix pillow
          # pytubefix نسخه بهتری از pytube است
      
      - name: Download Audio
        env:
          VIDEO_URL: ${{ github.event.inputs.url }}
        run: |
          python3 << 'EOF'
          from pytubefix import YouTube
          from pytubefix.contrib.library import Playlist
          import os
          
          url = os.environ['VIDEO_URL']
          print(f"Downloading: {url}")
          
          ys = YouTube(url)
          print(f"Title: {ys.title}")
          
          # دانلود audio
          audio = ys.streams.filter(only_audio=True).order_by('abr').desc().first()
          out_file = audio.download(output_path="downloads/")
          
          # تبدیل به mp3
          base, ext = os.path.splitext(out_file)
          new_file = base + '.mp3'
          os.rename(out_file, new_file)
          
          print(f"Downloaded: {new_file}")
          EOF
      
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add downloads/ 2>/dev/null
          
          if ! git diff --staged --quiet; then
            cd downloads && ls -t | tail -n +11 | xargs rm -f 2>/dev/null || true
            cd ..
            git add downloads/
            git commit -m "📥 Download $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
