# .github/workflows/download.yml
name: Smart YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true
        type: string
      quality:
        description: 'Audio Quality'
        required: false
        default: 'medium'
        type: choice
        options:
          - low
          - medium
          - high

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # حداکثر 30 دقیقه
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install yt-dlp
      
      - name: Download Audio
        id: download
        run: |
          QUALITY="${{ github.event.inputs.quality }}"
          case $QUALITY in
            low) BITRATE="128k" ;;
            medium) BITRATE="192k" ;;
            high) BITRATE="320k" ;;
          esac
          
          yt-dlp \
            --extract-audio \
            --audio-format mp3 \
            --audio-quality $BITRATE \
            --max-filesize 45M \
            --output "downloads/%(title)s.%(ext)s" \
            "${{ github.event.inputs.url }}"
          
          # نام فایل را ذخیره کن
          echo "filename=$(ls -t downloads/*.mp3 | head -1)" >> $GITHUB_OUTPUT
      
      - name: Check file size
        run: |
          SIZE=$(stat -f%z "${{ steps.download.outputs.filename }}" 2>/dev/null || stat -c%s "${{ steps.download.outputs.filename }}")
          echo "File size: $SIZE bytes"
          
          if [ $SIZE -gt 50000000 ]; then
            echo "File too large, removing..."
            rm "${{ steps.download.outputs.filename }}"
          fi
      
      - name: Cleanup old files
        run: |
          # فقط 5 فایل آخر را نگه دار
          cd downloads && ls -t | tail -n +6 | xargs rm -f 2>/dev/null || true
          cd ../videos && ls -t | tail -n +4 | xargs rm -f 2>/dev/null || true
      
      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📥 Download $(date +'%Y-%m-%d %H:%M')"
          file_pattern: "downloads/* videos/*"
