# .github/workflows/invidious-direct.yml
name: YouTube Downloader (Direct Invidious)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install yt-dlp requests
      
      - name: Download via Invidious
        env:
          VIDEO_URL: ${{ github.event.inputs.url }}
        run: |
          python3 << 'PYTHON_SCRIPT'
          import subprocess
          import re
          import os
          
          url = os.environ.get('VIDEO_URL', '')
          
          # استخراج video ID
          video_id = re.search(r'(?:v=|/v/)([a-zA-Z0-9_-]{11})', url)
          if not video_id:
              print("❌ Invalid URL")
              exit(1)
          
          video_id = video_id.group(1)
          print(f"Video ID: {video_id}")
          
          # سرورهای Invidious
          instances = [
              "yewtu.be",
              "invidious.privacyredirect.com",
              "invidious.fdn.fr",
              "vid.puffyan.us",
              "invidious.kavin.rocks",
          ]
          
          success = False
          
          for instance in instances:
              print(f"\n🔄 Trying {instance}...")
              
              # روش 1: yt-dlp با invidious extractor
              cmd = [
                  "yt-dlp",
                  "--extractor-args", f"invidious:{instance}",
                  "--extract-audio",
                  "--audio-format", "mp3",
                  "--audio-quality", "0",
                  "--max-filesize", "100M",
                  "--no-playlist",
                  "--output", f"downloads/%(title)s.%(ext)s",
                  f"https://www.youtube.com/watch?v={video_id}"
              ]
              
              result = subprocess.run(cmd, capture_output=True, text=True)
              
              if result.returncode == 0:
                  print(f"✅ Success with {instance}!")
                  success = True
                  break
              else:
                  print(f"❌ Failed: {result.stderr[:200]}")
          
          if not success:
              # روش 2: دانلود مستقیم با curl
              print("\n🔄 Trying direct download...")
              for instance in instances:
                  try:
                      import requests
                      
                      # دریافت اطلاعات ویدیو
                      api_url = f"https://{instance}/api/v1/videos/{video_id}"
                      resp = requests.get(api_url, timeout=15)
                      
                      if resp.status_code == 200:
                          data = resp.json()
                          title = data.get('title', 'video').replace('/', '-')
                          
                          # پیدا کردن لینک audio
                          for fmt in data.get('adaptiveFormats', []):
                              if 'audio' in fmt.get('type', ''):
                                  audio_url = fmt.get('url')
                                  if audio_url:
                                      print(f"📥 Downloading from {instance}...")
                                      
                                      audio_resp = requests.get(audio_url, stream=True, timeout=60)
                                      if audio_resp.status_code == 200:
                                          filename = f"downloads/{title}.mp3"
                                          with open(filename, 'wb') as f:
                                              for chunk in audio_resp.iter_content(8192):
                                                  f.write(chunk)
                                          print(f"✅ Downloaded: {filename}")
                                          success = True
                                          break
                          if success:
                              break
                  except Exception as e:
                      print(f"Error: {e}")
          
          if not success:
              print("❌ All methods failed")
              exit(1)
          
          PYTHON_SCRIPT
      
      - name: Commit and push
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add downloads/
          if ! git diff --staged --quiet; then
            git commit -m "📥 Download $(date +'%Y-%m-%d %H:%M')"
            git push
            echo "✅ Success!"
          fi
