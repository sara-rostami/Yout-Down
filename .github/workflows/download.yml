# .github/workflows/youtube-dl.yml
name: YouTube Downloader (youtube-dl)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install youtube-dl with ffmpeg
        run: |
          pip install youtube-dl
          apt-get update && apt-get install -y ffmpeg
      
      - name: Download video
        env:
          VIDEO_URL: ${{ github.event.inputs.url }}
        run: |
          # استفاده از گزینه‌های مختلف برای دور زدن محدودیت
          youtube-dl \
            --no-check-certificate \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            --extractor-args "youtube:player_client=web" \
            --geo-bypass \
            --no-playlist \
            --extract-audio \
            --audio-format mp3 \
            --audio-quality 0 \
            --max-filesize 100M \
            --output "downloads/%(title)s.%(ext)s" \
            "$VIDEO_URL"
      
      - name: Commit and push
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add downloads/
          if ! git diff --staged --quiet; then
            git commit -m "📥 Download $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
