# .github/workflows/download.yml
name: YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true
        type: string
      format:
        description: 'Format (video/audio)'
        required: false
        default: 'audio'
        type: choice
        options:
          - audio
          - video

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      # ✅ نسخه جدید با پشتیبانی Node.js 24
      - name: Checkout
        uses: actions/checkout@v4.with(node-version: '20')
      
      - name: Set up Python
        uses: actions/setup-python@v5.with:
          python-version: '3.12'
      
      - name: Install yt-dlp
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp
      
      - name: Download from YouTube
        env:
          VIDEO_URL: ${{ github.event.inputs.url }}
          FORMAT_TYPE: ${{ github.event.inputs.format }}
        run: |
          if [ "$FORMAT_TYPE" = "audio" ]; then
            yt-dlp \
              --extract-audio \
              --audio-format mp3 \
              --audio-quality 0 \
              --max-filesize 45M \
              --output "downloads/%(title)s.%(ext)s" \
              "$VIDEO_URL"
          else
            yt-dlp \
              -f "best[filesize<50M]" \
              --output "videos/%(title)s.%(ext)s" \
              "$VIDEO_URL"
          fi
      
      - name: Commit and push files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add downloads/ videos/ 2>/dev/null
          
          if ! git diff --staged --quiet; then
            # Cleanup old files
            cd downloads && ls -t | tail -n +11 | xargs rm -f 2>/dev/null || true
            cd ../videos && ls -t | tail -n +6 | xargs rm -f 2>/dev/null || true
            cd ../..
            
            git add downloads/ videos/
            git commit -m "📥 Download $(date +'%Y-%m-%d %H:%M')"
            git push
            echo "✅ Files pushed successfully"
          else
            echo "No new files to commit"
          fi
