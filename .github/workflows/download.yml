# .github/workflows/pytube.yml
name: YouTube Downloader (pytube)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: pip install pytube requests
      
      - name: Download
        env:
          VIDEO_URL: ${{ github.event.inputs.url }}
        run: |
          python3 << 'PYTHON_SCRIPT'
          import os
          import re
          import requests
          
          url = os.environ.get('VIDEO_URL', '')
          
          # استخراج video ID
          match = re.search(r'(?:v=|/v/)([a-zA-Z0-9_-]{11})', url)
          video_id = match.group(1) if match else url
          
          print(f"Video ID: {video_id}")
          
          # استفاده از Invidious API
          instances = [
              "yewtu.be",
              "vid.puffyan.us",
              "invidious.privacyredirect.com",
              "invidious.projectsegfau.lt",
          ]
          
          for instance in instances:
              try:
                  print(f"Trying {instance}...")
                  api_url = f"https://{instance}/api/v1/videos/{video_id}"
                  
                  resp = requests.get(api_url, timeout=15)
                  if resp.status_code == 200:
                      data = resp.json()
                      title = data.get('title', 'video').replace('/', '-')
                      
                      # پیدا کردن audio stream
                      for fmt in data.get('adaptiveFormats', []):
                          if 'audio' in fmt.get('type', ''):
                              audio_url = fmt.get('url')
                              if audio_url:
                                  print(f"Downloading from {instance}...")
                                  
                                  r = requests.get(audio_url, stream=True, timeout=60)
                                  if r.status_code == 200:
                                      ext = 'webm'
                                      filename = f"downloads/{title}.{ext}"
                                      
                                      with open(filename, 'wb') as f:
                                          for chunk in r.iter_content(8192):
                                              f.write(chunk)
                                      
                                      print(f"✅ Downloaded: {filename}")
                                      print(f"Size: {os.path.getsize(filename)/1024/1024:.2f} MB")
                                      exit(0)
              except Exception as e:
                  print(f"Error: {e}")
                  continue
          
          print("❌ All instances failed")
          exit(1)
          
          PYTHON_SCRIPT
      
      - name: Commit and push
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add downloads/
          if ! git diff --staged --quiet; then
            git commit -m "📥 Download $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
