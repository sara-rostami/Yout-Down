# .github/workflows/download.yml
name: YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install yt-dlp with dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp yt-dlp[default]
      
      - name: Download Audio (via Invidious)
        env:
          VIDEO_URL: ${{ github.event.inputs.url }}
        run: |
          # استفاده از سرور Invidious (جایگزین یوتیوب)
          yt-dlp \
            --extractor-args "youtube:player_client=android" \
            --extractor-args "youtube:player_skip=webpage,configs" \
            --extract-audio \
            --audio-format mp3 \
            --audio-quality 0 \
            --max-filesize 40M \
            --output "downloads/%(title)s.%(ext)s" \
            "$VIDEO_URL"
      
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add downloads/ 2>/dev/null
          
          if ! git diff --staged --quiet; then
            cd downloads && ls -t | tail -n +11 | xargs rm -f 2>/dev/null || true
            cd ..
            git add downloads/
            git commit -m "📥 Download $(date +'%Y-%m-%d %H:%M')"
            git push
            echo "✅ Success!"
          fi
